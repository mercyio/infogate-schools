<svg viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer circle border -->
  <circle cx="150" cy="150" r="135" fill="white" stroke="#1E3A8A" stroke-width="8"/>
  <circle cx="150" cy="150" r="125" fill="white" stroke="#1E3A8A" stroke-width="3"/>
  
  <!-- Inner circle -->
  <circle cx="150" cy="150" r="110" fill="white" stroke="#1E3A8A" stroke-width="2"/>

  <!-- Decorative dots -->
  <circle cx="70" cy="150" r="4" fill="#1E3A8A"/>
  <circle cx="230" cy="150" r="4" fill="#1E3A8A"/>

  <!-- Open book -->
  <path d="M 130 110 Q 130 105 135 105 L 145 105 L 145 130 L 135 130 Q 130 130 130 125 Z" fill="#1E3A8A"/>
  <path d="M 170 110 Q 170 105 165 105 L 155 105 L 155 130 L 165 130 Q 170 130 170 125 Z" fill="#1E3A8A"/>
  <path d="M 145 105 L 155 105 L 155 130 L 145 130 Z" fill="#E0E7FF"/>

  <!-- Book spine lines -->
  <line x1="140" y1="105" x2="140" y2="130" stroke="#1E3A8A" stroke-width="1"/>
  <line x1="160" y1="105" x2="160" y2="130" stroke="#1E3A8A" stroke-width="1"/>

  <!-- Three people above book -->
  <!-- Person 1 (Pink/Magenta) -->
  <circle cx="120" cy="85" r="5" fill="#E91E63"/>
  <path d="M 118 92 L 122 92 L 122 100 L 118 100 Z" fill="#E91E63"/>

  <!-- Person 2 (Yellow/Orange) - Center -->
  <circle cx="150" cy="80" r="6" fill="#FFA500"/>
  <path d="M 147 88 L 153 88 L 153 98 L 147 98 Z" fill="#FFA500"/>

  <!-- Person 3 (Blue) -->
  <circle cx="180" cy="85" r="5" fill="#3B82F6"/>
  <path d="M 178 92 L 182 92 L 182 100 L 178 100 Z" fill="#3B82F6"/>

  <!-- INFOGATE text at top (curved) -->
  <path id="topCurve" d="M 80 150 A 70 70 0 0 1 220 150" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E3A8A" letter-spacing="2">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">
      INFOGATE
    </textPath>
  </text>

  <!-- VOCATIONAL ACADEMY text at bottom (curved) -->
  <path id="bottomCurve" d="M 220 150 A 70 70 0 0 1 80 150" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E3A8A" letter-spacing="1">
    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">
      VOCATIONAL ACADEMY
    </textPath>
  </text>

  <!-- Tagline text at bottom -->
  <text x="150" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1E3A8A">
    ONE WITH GOD IS A MAJORITY
  </text>
</svg>
